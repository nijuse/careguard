name: Dashboard E2E

on:
  pull_request:
    paths:
      - "dashboard/**"
      - ".github/workflows/dashboard-e2e.yml"

jobs:
  e2e:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: dashboard/package-lock.json

      - name: Install deps
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium webkit

      - name: Lint
        run: npm run lint

      - name: Forbid localStorage/sessionStorage writes (#96)
        run: |
          if grep -rnE '(localStorage|sessionStorage)\.setItem' src; then
            echo "::error::Found a localStorage/sessionStorage.setItem call in dashboard/src — see docs/SECURITY.md for the exception process."
            exit 1
          fi

      - name: Run dashboard E2E
        env:
          NEXT_PUBLIC_API_URL: "http://localhost:3004"
        run: npm run test:e2e
