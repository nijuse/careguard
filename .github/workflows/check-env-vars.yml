name: Check Environment Variables

on:
  pull_request:
    paths:
      - '.env.example'
      - '**/*.ts'
      - '**/*.js'
  push:
    branches: [main]

jobs:
  check-env-vars:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - run: npm run check:env-vars
