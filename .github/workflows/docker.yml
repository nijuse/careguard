name: Docker

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    name: Build and push GHCR image
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image name
        id: image
        run: |
          image="${REGISTRY}/${GITHUB_REPOSITORY}"
          echo "name=${image,,}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=semver,pattern=v{{version}}
            type=semver,pattern=v{{major}}.{{minor}}
            type=semver,pattern=v{{major}}
            type=raw,value=latest
          labels: |
            org.opencontainers.image.title=CareGuard
            org.opencontainers.image.description=AI agent for elderly care financial coordination on Stellar
            org.opencontainers.image.vendor=${{ github.repository_owner }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ steps.image.outputs.name }}:buildcache
          cache-to: type=registry,ref=${{ steps.image.outputs.name }}:buildcache,mode=max

      - name: Report image size
        env:
          IMAGE_REF: ${{ steps.image.outputs.name }}:${{ github.ref_name }}
        run: |
          docker pull "$IMAGE_REF"
          bytes="$(docker image inspect "$IMAGE_REF" --format='{{.Size}}')"
          mb="$(awk "BEGIN { printf \"%.2f\", $bytes / 1024 / 1024 }")"
          {
            echo "### Docker image"
            echo ""
            echo "- Image: \`$IMAGE_REF\`"
            echo "- Digest: \`${{ steps.build.outputs.digest }}\`"
            echo "- Size: ${mb} MiB (${bytes} bytes)"
          } >> "$GITHUB_STEP_SUMMARY"
