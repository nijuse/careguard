name: Deploy Render

on:
  workflow_run:
    workflows: ["CI"]
    branches: [main]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: render-deploy-main
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to Render
    runs-on: ubuntu-latest
    timeout-minutes: 8
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'

    steps:
      - name: Trigger Render deploy hook
        id: trigger
        env:
          RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK" ]; then
            echo "::error::RENDER_DEPLOY_HOOK secret is required."
            exit 1
          fi

          response_file="$(mktemp)"
          http_code="$(curl -sS -o "$response_file" -w "%{http_code}" -X POST "$RENDER_DEPLOY_HOOK")"
          cat "$response_file" > render-deploy.json

          if [ "$http_code" -lt 200 ] || [ "$http_code" -ge 300 ]; then
            echo "::error::Render deploy hook returned HTTP $http_code."
            cat render-deploy.json
            exit 1
          fi

          deploy_id="$(node -e '
            const fs = require("fs");
            let data = {};
            try {
              const text = fs.readFileSync("render-deploy.json", "utf8").trim();
              data = text ? JSON.parse(text) : {};
            } catch {}
            process.stdout.write(data.id || data.deployId || data.deploy?.id || data.service?.latestDeploy?.id || "");
          ')"

          echo "deploy_id=$deploy_id" >> "$GITHUB_OUTPUT"
          if [ -n "$deploy_id" ]; then
            echo "Triggered Render deploy $deploy_id."
          else
            echo "::warning::Deploy hook did not return a deploy id; polling will use the latest service deploy."
          fi

      - name: Poll Render deploy status
        id: poll
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
          DEPLOY_ID: ${{ steps.trigger.outputs.deploy_id }}
        run: |
          if [ -z "$RENDER_API_KEY" ] || [ -z "$RENDER_SERVICE_ID" ]; then
            echo "::error::RENDER_API_KEY and RENDER_SERVICE_ID secrets are required for deploy polling."
            exit 1
          fi

          deploy_id="$DEPLOY_ID"
          if [ -z "$deploy_id" ]; then
            curl -fsS \
              -H "Authorization: Bearer $RENDER_API_KEY" \
              "https://api.render.com/v1/services/$RENDER_SERVICE_ID/deploys?limit=1" \
              > render-latest-deploy.json
            deploy_id="$(node -e '
              const fs = require("fs");
              const data = JSON.parse(fs.readFileSync("render-latest-deploy.json", "utf8"));
              const first = Array.isArray(data) ? data[0] : data.deploys?.[0];
              const deploy = first?.deploy || first || {};
              process.stdout.write(deploy.id || "");
            ')"
          fi

          if [ -z "$deploy_id" ]; then
            echo "::error::Unable to determine Render deploy id."
            exit 1
          fi

          echo "deploy_id=$deploy_id" >> "$GITHUB_OUTPUT"

          elapsed=0
          delay=5
          max_seconds=300

          while [ "$elapsed" -le "$max_seconds" ]; do
            curl -fsS \
              -H "Authorization: Bearer $RENDER_API_KEY" \
              "https://api.render.com/v1/services/$RENDER_SERVICE_ID/deploys/$deploy_id" \
              > render-deploy-status.json

            status="$(node -e '
              const fs = require("fs");
              const data = JSON.parse(fs.readFileSync("render-deploy-status.json", "utf8"));
              const deploy = data.deploy || data;
              process.stdout.write(deploy.status || "unknown");
            ')"
            echo "Render deploy $deploy_id status: $status"

            case "$status" in
              live|succeeded)
                echo "status=$status" >> "$GITHUB_OUTPUT"
                exit 0
                ;;
              build_failed|update_failed|failed|canceled|cancelled|deactivated)
                echo "status=$status" >> "$GITHUB_OUTPUT"
                echo "::error::Render deploy failed with status $status."
                exit 1
                ;;
            esac

            sleep "$delay"
            elapsed=$((elapsed + delay))
            if [ "$delay" -lt 60 ]; then
              delay=$((delay * 2))
              if [ "$delay" -gt 60 ]; then
                delay=60
              fi
            fi
          done

          echo "::error::Render deploy did not complete within 5 minutes."
          exit 1

      - name: Add deployment summary
        if: always()
        env:
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
          RENDER_DEPLOY_PAGE: ${{ secrets.RENDER_DEPLOY_PAGE }}
          DEPLOY_ID: ${{ steps.poll.outputs.deploy_id || steps.trigger.outputs.deploy_id }}
          DEPLOY_STATUS: ${{ steps.poll.outputs.status }}
        run: |
          deploy_page="$RENDER_DEPLOY_PAGE"
          if [ -z "$deploy_page" ] && [ -n "$RENDER_SERVICE_ID" ] && [ -n "$DEPLOY_ID" ]; then
            deploy_page="https://dashboard.render.com/web/$RENDER_SERVICE_ID/deploys/$DEPLOY_ID"
          fi

          {
            echo "### Render deployment"
            echo ""
            echo "- Deploy id: \`${DEPLOY_ID:-unknown}\`"
            echo "- Status: \`${DEPLOY_STATUS:-unknown}\`"
            if [ -n "$deploy_page" ]; then
              echo "- Render deploy page: [$deploy_page]($deploy_page)"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
