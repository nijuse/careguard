# Dev-only overrides — picked up automatically by `docker compose up`.
# Rename or delete this file to run the production-style stack from
# docker-compose.yml only.
#
# What this gives you on top of docker-compose.yml:
#   - Hot reload for the Express server (mounts the source tree).
#   - Hot reload for the Next.js dashboard (uses `next dev`).
#   - Verbose logging (NODE_ENV=development).
#
# Trade-offs: dev mode is slower to start and uses more memory than the
# multi-stage build images. Use only `docker compose -f docker-compose.yml up`
# (passing -f explicitly disables override pickup) for prod-shape testing.

services:
  server:
    image: node:22-alpine
    build: !reset null
    working_dir: /app
    command: sh -c "npm ci --legacy-peer-deps && npm run dev"
    environment:
      NODE_ENV: development
  redis:
    image: redis:7-alpine
    container_name: careguard-redis
    ports:
      - "6379:6379"
    networks:
      - careguard-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  prometheus:
    image: prom/prometheus:latest
    container_name: careguard-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    # Optional: set METRICS_TOKEN in .env and Prometheus will send it as a bearer token.
    # See docker/prometheus/prometheus.yml for scrape_config bearer_token usage.

  dashboard:
    image: node:22-alpine
    build: !reset null
    working_dir: /app/dashboard
    command: sh -c "npm ci --legacy-peer-deps && npm run dev -- -H 0.0.0.0 -p 3000"
    environment:
      NODE_ENV: development
      NEXT_TELEMETRY_DISABLED: "1"
    volumes:
      - .:/app
      - dashboard-node-modules:/app/dashboard/node_modules
      - dashboard-next-cache:/app/dashboard/.next

volumes:
  server-node-modules:
  dashboard-node-modules:
  dashboard-next-cache:
